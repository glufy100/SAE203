{% extends 'drive/base.html' %}
{% block title %}Supprimer Produit - Drive{% endblock %}
{% block content %}
<!-- Confirmation de suppression d'un produit -->
<div class="header">
    <h1>Supprimer le produit</h1>
</div>
<div class="card">
    <p>Êtes-vous sûr de vouloir supprimer le produit <strong>{{ produit.nom }}</strong> ?</p>
    <p class="text-danger">Cette action est irréversible.</p>
    <form method="POST" class="header-actions">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'produit_list' %}" class="btn">Annuler</a>
    </form>
</div>
{% endblock %}
